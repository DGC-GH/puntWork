name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, mysqli, mbstring, xml, curl, zip
        tools: composer, phpcs

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install PHP dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Setup WordPress test environment
      run: |
        mkdir -p wordpress-test
        cd wordpress-test
        wget -q https://wordpress.org/latest.tar.gz
        tar -xzf latest.tar.gz --strip-components=1
        cp ../wp-tests-config-sample.php wp-tests-config.php
        sed -i 's/youremptytestdbnamehere/wordpress_test/' wp-tests-config.php
        sed -i 's/yourusernamehere/wordpress/' wp-tests-config.php
        sed -i 's/yourpasswordhere/wordpress/' wp-tests-config.php
        sed -i 's/localhost/127.0.0.1/' wp-tests-config.php

    - name: Run PHPCS
      run: ./vendor/bin/phpcs includes/ --standard=PSR12 --report=summary

    - name: Run PHPUnit tests
      run: ./vendor/bin/phpunit --testdox --verbose
      env:
        WP_TESTS_DIR: wordpress-test

    - name: Generate coverage report
      run: ./vendor/bin/phpunit --coverage-clover=coverage.xml
      env:
        WP_TESTS_DIR: wordpress-test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, mysqli, mbstring, xml, curl, zip

    - name: Install dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Create deployment package
      run: |
        mkdir deployment
        cp -r includes deployment/
        cp -r assets deployment/
        cp -r languages deployment/
        cp -r mobile deployment/
        cp -r tests deployment/
        cp -r vendor deployment/
        cp *.php deployment/
        cp composer.json deployment/
        cp composer.lock deployment/
        cp README.md deployment/

    - name: Deploy to production
      run: |
        echo "Deployment package created successfully"
        echo "In a real scenario, this would upload to your hosting provider"
        echo "For now, the deployment package is ready in the 'deployment' directory"